<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>상담 전 자산현황 설문 — Risolve</title>
<style>
  :root{
    --p:#008C8C; --p-d:#006b6c; --p-l:#e3f3f3;
    --kbyellow:#FFC800; --kbyellow-d:#e6b400; --gold:#B8960C;
    --ok:#16a34a; --err:#D94F4F;
    --g:#73716c; --line:#e5e3dd; --bg:#F8F7F4; --ink:#1A1A1A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,'Pretendard','Malgun Gothic','Noto Sans KR',sans-serif;margin:0;background:var(--bg);color:var(--ink);line-height:1.6;font-size:17px;}

  /* ── 상단 고정: 헤더 + 진행률 ── */
  .top{position:sticky;top:0;z-index:20;}
  header{background:var(--p);color:#fff;padding:14px 18px 12px;text-align:center;}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:-.3px;}
  .prog{background:#fff;border-bottom:1px solid var(--line);padding:10px 16px 12px;}
  .prog-label{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--p-d);margin-bottom:6px;}
  .prog-label .pl-r{color:var(--g);font-weight:600;}
  .prog-bar{height:8px;background:var(--line);border-radius:4px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--kbyellow));border-radius:4px;transition:width .25s;}

  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 130px;}

  /* ── 이어서 작성 배너 ── */
  .resume{display:none;background:#fff;border:2px solid var(--kbyellow);border-radius:14px;padding:14px;margin-bottom:14px;}
  .resume p{margin:0 0 10px;font-size:15px;font-weight:600;}
  .resume .r-row{display:flex;gap:8px;}
  .resume button{flex:1;padding:13px;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;min-height:48px;}
  .resume .r-go{background:var(--kbyellow);border:none;color:var(--ink);}
  .resume .r-new{background:#fff;border:2px solid var(--line);color:var(--g);}

  /* ── 스텝 ── */
  .step{display:none;}
  .step.on{display:block;}
  .sec{background:#fff;border-radius:14px;padding:18px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(26,26,26,.06);}
  .sec-title{font-size:18px;font-weight:800;color:var(--p-d);margin:0 0 4px;}
  .sec-sub{font-size:13px;color:var(--g);margin:0 0 12px;}
  .skip-hint{background:var(--p-l);color:var(--p-d);font-size:13px;font-weight:600;border-radius:10px;padding:9px 12px;margin:0 0 14px;line-height:1.5;}
  .all-none{width:100%;padding:12px;margin:0 0 16px;background:#fff;border:2px dashed var(--p);border-radius:11px;color:var(--p-d);font-size:15px;font-weight:700;cursor:pointer;min-height:48px;}
  .all-none.done{background:var(--p-l);border-style:solid;}

  .q{margin-bottom:20px;}
  .q:last-child{margin-bottom:0;}
  .q-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .q-label{font-size:16px;font-weight:700;}
  .q-direct-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .q-direct{width:80px;padding:10px 8px;border:2px solid var(--line);border-radius:10px;font-size:16px;text-align:right;}
  .q-direct:focus{outline:none;border-color:var(--p);}
  .q-unit{font-size:13px;color:var(--g);min-width:20px;}
  .q-value{font-size:13px;font-weight:700;color:var(--p-d);background:var(--p-l);padding:3px 9px;border-radius:6px;white-space:nowrap;}
  .q-value:empty{display:none;}
  .req{color:var(--err);font-size:14px;}
  input[type=text],input[type=tel],input[type=date]{width:100%;padding:14px;border:2px solid var(--line);border-radius:11px;font-size:17px;background:#fff;}
  input:focus{outline:none;border-color:var(--p);}
  .opts{display:flex;flex-wrap:wrap;gap:8px;}
  .opt{flex:1 1 auto;min-width:30%;padding:13px 6px;border:2px solid var(--line);border-radius:11px;background:#fff;font-size:14px;font-weight:600;color:#44403a;cursor:pointer;text-align:center;min-height:48px;}
  .opt:active{transform:scale(.98);}
  .opt.sel{border-color:var(--p);background:var(--p-l);color:var(--p-d);box-shadow:0 0 0 2px rgba(0,140,140,.15) inset;}

  /* ── 확인 단계 ── */
  .sum-row{display:flex;justify-content:space-between;padding:9px 2px;border-bottom:1px solid var(--line);font-size:15px;}
  .sum-row:last-child{border-bottom:none;}
  .sum-k{color:var(--g);}
  .sum-v{font-weight:700;}
  .sum-badge{display:inline-block;background:var(--p-l);color:var(--p-d);font-size:13px;font-weight:700;border-radius:8px;padding:2px 10px;}

  /* ── 하단 고정 내비게이션 ── */
  .submit-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(26,26,26,.08);z-index:20;}
  .submit-bar .inner{max-width:560px;margin:0 auto;display:flex;gap:10px;}
  .btn-prev{flex:0 0 96px;padding:15px 0;background:#fff;border:2px solid var(--line);border-radius:12px;font-size:16px;font-weight:700;color:var(--g);cursor:pointer;min-height:52px;}
  .btn-prev:disabled{opacity:.35;}
  .btn-next{flex:1;padding:15px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:800;cursor:pointer;min-height:52px;}
  .btn-next.final{background:var(--kbyellow);color:var(--ink);}
  .btn-next:disabled{background:#b9b5ad;color:#fff;}
  .note{font-size:12px;color:var(--g);text-align:center;margin-top:8px;line-height:1.5;}

  #done{display:none;text-align:center;padding:40px 18px;}
  #done .big{font-size:54px;}
  #done h2{color:var(--p-d);font-size:22px;margin:10px 0;}
  #jsonbox{display:none;background:#1f1e1c;color:#e5e3dd;font-size:11px;font-family:monospace;padding:12px;border-radius:10px;white-space:pre-wrap;word-break:break-all;margin-top:14px;text-align:left;}
  .copybtn{margin-top:10px;padding:14px 20px;background:var(--kbyellow);color:var(--ink);border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;min-height:48px;}
</style>
</head>
<body>

<!-- ⚙️ 배포 설정: Apps Script 배포 후 아래 두 값을 채우세요. 비워두면 제출 시 'JSON 복사'로 동작(수동 전달). -->
<script>
  window.SURVEY_POST_URL   = '';   // 예: https://script.google.com/macros/s/XXXX/exec
  window.SURVEY_WRITE_TOKEN = '';  // 설문 전용 쓰기 토큰
</script>

<div class="top">
  <header><h1>🏦 상담 전 자산현황 설문</h1></header>
  <div class="prog">
    <div class="prog-label"><span id="prog-step">1/8 · 기본 정보</span><span class="pl-r" id="prog-pct"></span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:5%"></div></div>
  </div>
</div>

<div class="wrap" id="form">

  <div class="resume" id="resume">
    <p>✍️ 작성하시던 내용이 있습니다.</p>
    <div class="r-row">
      <button class="r-go" onclick="resumeDraft()">이어서 작성</button>
      <button class="r-new" onclick="discardDraft()">새로 작성</button>
    </div>
  </div>

  <!-- 단계 0: 기본 정보 -->
  <div class="step on" data-step="0">
    <div class="sec">
      <div class="sec-title">기본 정보</div>
      <div class="sec-sub">상담사가 자료를 찾는 데 사용됩니다. 1분이면 끝나요 😊</div>
      <div class="q"><div class="q-label">성함 <span class="req">*</span></div><input type="text" id="f-name" placeholder="예: 홍길동"></div>
      <div class="q"><div class="q-label">전화번호 <span class="req">*</span></div><input type="tel" id="f-phone" inputmode="numeric" placeholder="예: 010-1234-5678"></div>
      <div class="q"><div class="q-label">생년월일 <span style="font-size:13px;color:var(--g);font-weight:500">(선택)</span></div><input type="date" id="f-birth" max="2010-12-31" min="1930-01-01"></div>
    </div>
  </div>

  <!-- 단계 1~6: 자산 그룹 (JS 렌더) -->
  <div id="sec-questions"></div>

  <!-- 마지막 단계: 확인·제출 -->
  <div class="step" data-step="last">
    <div class="sec">
      <div class="sec-title">작성 내용 확인</div>
      <div class="sec-sub">아래 내용으로 제출됩니다. 수정하려면 [이전]을 누르세요.</div>
      <div id="summary"></div>
      <div class="skip-hint" style="margin-top:14px">답하지 않은 항목은 "모름"으로 전달되며, 상담 때 함께 확인하면 됩니다.</div>
    </div>
  </div>

</div>

<div class="submit-bar" id="bar">
  <div class="inner">
    <button class="btn-prev" id="btn-prev" onclick="goStep(curStep-1)">← 이전</button>
    <button class="btn-next" id="btn-next" onclick="nextStep()">다음 →</button>
  </div>
  <div class="note" id="bar-note">입력하신 정보는 상담 목적에만 사용되며 안전하게 보관됩니다.</div>
</div>

<div class="wrap" id="done">
  <div class="big">✅</div>
  <h2>제출이 완료되었습니다</h2>
  <p>상담사에게 자료가 전달되었습니다.<br>상담 때 뵙겠습니다. 감사합니다 😊</p>
  <div id="jsonbox"></div>
  <button class="copybtn" id="copybtn" style="display:none" onclick="copyJson()">📋 내용 복사 (상담사 전달용)</button>
</div>

<script>
// ── 금액 구간 척도 — 대표값은 앱 자산현황탭 입력값과 동일(절대 변경 금지) ──
//    라벨만 고객 친화적(억/천만/만원 한글)으로 표기. 내부 단위:
//    SCALE_RE: 천만원(부동산·대출) · SCALE_FIN: 백만원(금융·연금·기타) · SCALE_MON: 만원(소득)
var SCALE_RE = [['없음',0],['1억 미만',5],['1~3억',20],['3~5억',40],['5~7억',60],['7~10억',85],['10~15억',125],['15~20억',175],['20억 이상',250],['모름',null]];
var SCALE_FIN= [['없음',0],['1천만 미만',5],['1천~3천만',20],['3천~5천만',40],['5천만~1억',75],['1~3억',200],['3~5억',400],['5~10억',750],['10억 이상',1300],['모름',null]];
var SCALE_MON= [['없음',0],['100만 미만',50],['100~200만',150],['200~300만',250],['300~500만',400],['500~700만',600],['700~1000만',850],['1000만 이상',1300],['모름',null]];

// id(앱 입력) · 라벨 · 척도 — id·factor·unit은 앱과의 SSOT, 변경 금지
var GROUPS = [
  { title:'부동산', sub:'대략적인 시세 기준으로 눌러주세요', factor:1, unit:'천만원', items:[
    ['a-home','거주 중인 주택',SCALE_RE],
    ['a-invest-re','투자·임대용 부동산',SCALE_RE],
    ['a-land','토지',SCALE_RE],
    ['a-overseas-re','해외 부동산',SCALE_RE],
  ]},
  { title:'금융 자산', sub:'현재 보유 금액', factor:1, unit:'백만원', items:[
    ['a-kr-stock','국내 주식·펀드',SCALE_FIN],
    ['a-us-stock','해외 주식·ETF',SCALE_FIN],
    ['a-bond','채권·MMF',SCALE_FIN],
    ['a-cash','현금·예적금',SCALE_FIN],
    ['a-cma','CMA·RP',SCALE_FIN],
    ['a-forex','외화·달러예금',SCALE_FIN],
  ]},
  { title:'연금·보험', sub:'적립/예상 금액', factor:1, unit:'백만원', items:[
    ['a-irs','연금저축·IRP',SCALE_FIN],
    ['a-tax-free-ins','비과세 저축보험',SCALE_FIN],
    ['a-retire-fund','퇴직금 예상액',SCALE_FIN],
    ['a-noran','노란우산공제',SCALE_FIN],
  ]},
  { title:'기타 자산', sub:'', factor:1, unit:'백만원', items:[
    ['a-membership','골프·콘도 회원권',SCALE_FIN],
    ['a-business','사업체·지분 가치',SCALE_FIN],
    ['a-other','기타 자산',SCALE_FIN],
  ]},
  { title:'대출', sub:'남은 대출 잔액', factor:1, unit:'천만원', items:[
    ['a-loan-mortgage','주택담보대출',SCALE_RE],
    ['a-loan-other','기타 대출',SCALE_RE],
  ]},
  { title:'소득·저축 (월)', sub:'한 달 기준', factor:1, unit:'만원', items:[
    ['ta-income-amt','월 소득(세후)',SCALE_MON],
    ['ta-income-save','월 저축·연금 납입',SCALE_MON],
    ['n-p-income','국민연금 가입 시 평균 월소득',SCALE_MON],
  ]},
];

var answers = {};   // id -> 앱 입력값 (payload 그대로 — 형식 변경 금지)
var sels = {};      // id -> {t:'opt',i} | {t:'dir',v}  (임시저장 복원용)
var meta = {};      // id -> factor
var UNITS = {};     // id -> 앱 단위
var TOTAL_STEPS = GROUPS.length + 2;   // 기본정보 + 그룹들 + 확인
var curStep = 0;

// ── 그룹 렌더 (그룹당 한 스텝) ──
(function render(){
  var host = document.getElementById('sec-questions');
  var html = '';
  GROUPS.forEach(function(g, gi){
    html += '<div class="step" data-step="'+(gi+1)+'"><div class="sec">';
    html += '<div class="sec-title">'+g.title+'</div>';
    if(g.sub) html += '<div class="sec-sub">'+g.sub+'</div>';
    html += '<div class="skip-hint">💡 모르시면 그냥 <b>다음</b>을 누르세요 — 자동으로 "모름" 처리됩니다.</div>';
    html += '<button type="button" class="all-none" data-g="'+gi+'" onclick="allNone(this)">⚡ 해당 없음 — 이 항목 모두 "없음"</button>';
    g.items.forEach(function(it){
      var id=it[0], label=it[1], scale=it[2];
      meta[id]=g.factor;
      UNITS[id]=g.unit;
      html += '<div class="q">'
        + '<div class="q-head"><div class="q-label">'+label+'</div>'
        + '<div class="q-direct-wrap"><span class="q-value" data-id="'+id+'"></span><input type="number" class="q-direct" data-id="'+id+'" inputmode="decimal" min="0" step="any" placeholder="직접" oninput="onDirect(this)"><span class="q-unit">'+g.unit+'</span></div></div>'
        + '<div class="opts" data-id="'+id+'">';
      scale.forEach(function(opt,oi){
        html += '<button type="button" class="opt" data-i="'+oi+'" onclick="pick(this)">'+opt[0]+'</button>';
      });
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  host.innerHTML = html;
})();

var SCALEMAP = {};
GROUPS.forEach(function(g){ g.items.forEach(function(it){ SCALEMAP[it[0]]=it[2]; }); });

// 값 표시 포맷 — 앱 자산현황탭 fmtM과 동일 규칙
var TO_MAN = {'천만원':1000,'백만원':100,'만원':1};
function fmtVal(appVal, unit){
  var man = (parseFloat(appVal)||0) * (TO_MAN[unit]||1);
  var abs = Math.abs(man);
  var s = (abs>=10000) ? (abs/10000).toFixed(2)+'억원'
                       : Math.round(abs).toLocaleString()+'만원';
  if(unit==='만원') s += '/월';
  return s;
}

function updateValueDisplay(id){
  var el = document.querySelector('.q-value[data-id="'+id+'"]');
  if(!el) return;
  if(answers[id]===undefined){ el.textContent=''; return; }
  el.textContent = fmtVal(answers[id], UNITS[id]);
}

function pick(btn){
  var row = btn.parentNode;
  var id = row.getAttribute('data-id');
  Array.prototype.forEach.call(row.children, function(c){ c.classList.remove('sel'); });
  btn.classList.add('sel');
  var di = document.querySelector('.q-direct[data-id="'+id+'"]'); if(di) di.value='';
  var i = +btn.getAttribute('data-i');
  var rep = SCALEMAP[id][i][1];
  if(rep===null){ delete answers[id]; delete sels[id]; updateValueDisplay(id); saveDraft(); return; }
  answers[id] = Math.round(rep * meta[id]);
  sels[id] = {t:'opt', i:i};
  updateValueDisplay(id);
  saveDraft();
}

function onDirect(input){
  var id = input.getAttribute('data-id');
  var row = document.querySelector('.opts[data-id="'+id+'"]');
  if(row) Array.prototype.forEach.call(row.children, function(c){ c.classList.remove('sel'); });
  var v = parseFloat(input.value);
  if(input.value==='' || isNaN(v) || v<0){ delete answers[id]; delete sels[id]; updateValueDisplay(id); saveDraft(); return; }
  answers[id] = Math.round(v * meta[id] * 100) / 100;
  sels[id] = {t:'dir', v:input.value};
  updateValueDisplay(id);
  saveDraft();
}

// 그룹 전체 "없음" 원탭
function allNone(btn){
  var gi = +btn.getAttribute('data-g');
  GROUPS[gi].items.forEach(function(it){
    var id = it[0];
    var row = document.querySelector('.opts[data-id="'+id+'"]');
    if(!row) return;
    var first = row.querySelector('.opt[data-i="0"]');   // '없음'
    if(first) pick(first);
  });
  btn.classList.add('done');
  btn.textContent = '✓ 모두 "없음" 처리됨 — 개별 수정 가능';
}

// ── 스텝 내비게이션 ──
var STEP_NAMES = ['기본 정보'].concat(GROUPS.map(function(g){return g.title;})).concat(['확인·제출']);
function goStep(n){
  if(n<0 || n>=TOTAL_STEPS) return;
  curStep = n;
  document.querySelectorAll('.step').forEach(function(el){ el.classList.remove('on'); });
  var sel = (n===TOTAL_STEPS-1) ? '.step[data-step="last"]' : '.step[data-step="'+n+'"]';
  var stepEl = document.querySelector(sel);
  if(stepEl) stepEl.classList.add('on');
  // 진행률
  document.getElementById('prog-step').textContent = (n+1)+'/'+TOTAL_STEPS+' · '+STEP_NAMES[n];
  document.getElementById('prog-pct').textContent = Math.round((n+1)/TOTAL_STEPS*100)+'%';
  document.getElementById('prog-fill').style.width = ((n+1)/TOTAL_STEPS*100)+'%';
  // 버튼 상태
  document.getElementById('btn-prev').disabled = (n===0);
  var next = document.getElementById('btn-next');
  if(n===TOTAL_STEPS-1){ next.textContent='제출하기'; next.classList.add('final'); renderSummary(); }
  else { next.textContent='다음 →'; next.classList.remove('final'); }
  document.getElementById('bar-note').textContent = (n===TOTAL_STEPS-1)
    ? '입력하신 정보는 상담 목적에만 사용되며 안전하게 보관됩니다.'
    : '모르는 항목은 건너뛰어도 됩니다.';
  window.scrollTo(0,0);
  saveDraft();
}

function nextStep(){
  if(curStep===0){
    var name=(document.getElementById('f-name').value||'').trim();
    var phone=(document.getElementById('f-phone').value||'').replace(/[^0-9]/g,'');
    if(!name){ alert('성함을 입력해 주세요.'); document.getElementById('f-name').focus(); return; }
    if(phone.length<9){ alert('전화번호를 정확히 입력해 주세요.'); document.getElementById('f-phone').focus(); return; }
  }
  if(curStep===TOTAL_STEPS-1){ submitSurvey(); return; }
  goStep(curStep+1);
}

// ── 확인 단계 요약 ──
function renderSummary(){
  var host = document.getElementById('summary');
  var html = '<div class="sum-row"><span class="sum-k">성함</span><span class="sum-v">'+escHtml(document.getElementById('f-name').value||'-')+'</span></div>'
           + '<div class="sum-row"><span class="sum-k">전화번호</span><span class="sum-v">'+escHtml(document.getElementById('f-phone').value||'-')+'</span></div>';
  var birth = document.getElementById('f-birth').value;
  if(birth) html += '<div class="sum-row"><span class="sum-k">생년월일</span><span class="sum-v">'+escHtml(birth)+'</span></div>';
  var total = 0; GROUPS.forEach(function(g){ total += g.items.length; });
  var ansCnt = Object.keys(answers).length;
  html += '<div class="sum-row"><span class="sum-k">답변한 항목</span><span class="sum-v"><span class="sum-badge">'+ansCnt+'개</span></span></div>'
        + '<div class="sum-row"><span class="sum-k">모름·건너뜀</span><span class="sum-v"><span class="sum-badge" style="background:#f2f1ec;color:var(--g)">'+(total-ansCnt)+'개</span></span></div>';
  host.innerHTML = html;
}

function escHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}

// ── 자동 임시저장 (localStorage) ──
var DRAFT_KEY = '__survey_draft';
var __booted = false;   // init 중 goStep(0)이 기존 draft를 빈 값으로 덮어쓰는 것 방지
function saveDraft(){
  if(!__booted) return;
  try{
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      name: document.getElementById('f-name').value||'',
      phone: document.getElementById('f-phone').value||'',
      birth: document.getElementById('f-birth').value||'',
      sels: sels, step: curStep, t: Date.now()
    }));
  }catch(e){}
}
function loadDraft(){
  try{ var d = JSON.parse(localStorage.getItem(DRAFT_KEY)||'null'); return d; }catch(e){ return null; }
}
function hasContent(d){
  return d && (d.name || d.phone || (d.sels && Object.keys(d.sels).length));
}
function resumeDraft(){
  var d = loadDraft(); if(!d) { discardDraft(); return; }
  document.getElementById('f-name').value = d.name||'';
  document.getElementById('f-phone').value = d.phone||'';
  document.getElementById('f-birth').value = d.birth||'';
  Object.keys(d.sels||{}).forEach(function(id){
    var s = d.sels[id];
    if(s.t==='opt'){
      var b = document.querySelector('.opts[data-id="'+id+'"] .opt[data-i="'+s.i+'"]');
      if(b) pick(b);
    } else if(s.t==='dir'){
      var di = document.querySelector('.q-direct[data-id="'+id+'"]');
      if(di){ di.value = s.v; onDirect(di); }
    }
  });
  document.getElementById('resume').style.display='none';
  goStep(Math.min(d.step||0, TOTAL_STEPS-1));
}
function discardDraft(){
  try{ localStorage.removeItem(DRAFT_KEY); }catch(e){}
  document.getElementById('resume').style.display='none';
}

// 기본정보 입력 시에도 임시저장
['f-name','f-birth'].forEach(function(id){
  document.getElementById(id).addEventListener('input', saveDraft);
});

// ── 제출 (payload 형식 — 앱 '설문 불러오기'와 SSOT, 변경 금지) ──
function submitSurvey(){
  var name=(document.getElementById('f-name').value||'').trim();
  var phone=(document.getElementById('f-phone').value||'').replace(/[^0-9]/g,'');
  var birth=(document.getElementById('f-birth').value||'').trim();
  if(!name){ alert('성함을 입력해 주세요.'); goStep(0); return; }
  if(phone.length<9){ alert('전화번호를 정확히 입력해 주세요.'); goStep(0); return; }

  var inputs = {};
  inputs['client-name']=name;
  if(birth) inputs['client-birth']=birth;
  Object.keys(answers).forEach(function(id){ inputs[id]=answers[id]; });

  var payload = { name:name, phone:phone, date:new Date().toISOString(), inputs:inputs };

  var btn=document.getElementById('btn-next');
  btn.disabled=true; btn.textContent='전송 중...';

  if(window.SURVEY_POST_URL){
    fetch(window.SURVEY_POST_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ token: window.SURVEY_WRITE_TOKEN||'', payload: payload })
    }).then(function(r){ return r.text(); }).then(function(){
      showDone(false);
    }).catch(function(){
      showDone(true, payload);
    });
  } else {
    showDone(true, payload);
  }
}

function showDone(manual, payload){
  try{ localStorage.removeItem(DRAFT_KEY); }catch(e){}
  document.getElementById('form').style.display='none';
  document.getElementById('bar').style.display='none';
  document.querySelector('.prog').style.display='none';
  document.getElementById('done').style.display='block';
  if(manual){
    var box=document.getElementById('jsonbox');
    box.style.display='block';
    box.textContent=JSON.stringify(payload);
    document.getElementById('copybtn').style.display='inline-block';
    window.__payload=JSON.stringify(payload);
    var h=document.querySelector('#done h2'); if(h) h.textContent='작성이 완료되었습니다';
    var p=document.querySelector('#done p'); if(p) p.innerHTML='아래 <b>내용 복사</b>를 눌러 상담사에게 전달해 주세요.';
  }
}

function copyJson(){
  var t=window.__payload||'';
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){alert('복사되었습니다. 상담사에게 전달해 주세요.');}); }
  else { var ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('복사되었습니다.'); }
}

// 전화번호 자동 하이픈
document.getElementById('f-phone').addEventListener('input', function(){
  var v=this.value.replace(/[^0-9]/g,'').slice(0,11);
  if(v.length<4) this.value=v;
  else if(v.length<8) this.value=v.slice(0,3)+'-'+v.slice(3);
  else this.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  saveDraft();
});

// ── 초기화: 임시저장 복원 배너 ──
(function init(){
  goStep(0);
  var d = loadDraft();
  if(hasContent(d)) document.getElementById('resume').style.display='block';
  __booted = true;
})();
</script>
